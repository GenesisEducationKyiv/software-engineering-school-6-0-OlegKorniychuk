services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: releases_api
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:password@db:5432/releases_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - API_KEY=secret-api-key
      - NOTIFICATION_TOKEN_SECRET=test-notification-secret
      - LOG_FILE=/var/log/github-release-notifier/app.log
      - TRACKER_SERVICE_URL=http://tracker:3001
      - TRACKER_API_KEY=secret-api-key

      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_SERVICE_USERNAME=${EMAIL_SERVICE_USERNAME}
      - EMAIL_SERVICE_PASSWORD=${EMAIL_SERVICE_PASSWORD}
    volumes:
      - logdata:/var/log/github-release-notifier
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      tracker:
        condition: service_started
    restart: no

  tracker:
    build:
      context: .
      dockerfile: Dockerfile
      target: tracker
    container_name: releases_tracker
    ports:
      - '3002:3001'
    environment:
      - TRACKER_PORT=3001
      - DATABASE_URL=postgres://postgres:password@db:5432/releases_db
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - API_KEY=secret-api-key
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: no

  db:
    image: postgres:15-alpine
    container_name: releases_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=releases_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d releases_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  redis:
    image: redis:7-alpine
    container_name: releases_redis
    ports:
      - '6379:6379'
    restart: no

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: releases_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: no

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: releases_filebeat
    user: root
    entrypoint: ['/usr/bin/tini', '--']
    command:
      [
        'filebeat',
        '-e',
        '-c',
        '/usr/share/filebeat/filebeat.yml',
        '--strict.perms=false',
      ]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - logdata:/var/log/github-release-notifier:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: no

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: releases_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -s http://localhost:9200 | grep -q 'You Know, for Search'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: no

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: releases_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: no

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: releases_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - api
    restart: no

  grafana:
    image: grafana/grafana:10.4.0
    container_name: releases_grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: no

volumes:
  pgdata:
  logdata:
  esdata:
  prometheusdata:
  grafanadata:
