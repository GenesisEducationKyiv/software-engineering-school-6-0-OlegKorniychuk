name: Build, Lint & Format

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-lint-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Lint Code
        run: npm run lint

      - name: Check formatting
        run: npm run format
