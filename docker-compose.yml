services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: releases_api
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:password@db:5432/releases_db
      - REDIS_URL=redis://redis:6379
      - API_KEY=secret-api-key
      - NOTIFICATION_TOKEN_SECRET=test-notification-secret
      - LOG_FILE=/var/log/github-release-notifier/app.log

      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - EMAIL_SERVICE=${EMAIL_SERVICE}
      - EMAIL_SERVICE_USERNAME=${EMAIL_SERVICE_USERNAME}
      - EMAIL_SERVICE_PASSWORD=${EMAIL_SERVICE_PASSWORD}
    volumes:
      - logdata:/var/log/github-release-notifier
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: no

  db:
    image: postgres:15-alpine
    container_name: releases_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=releases_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d releases_db']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  redis:
    image: redis:7-alpine
    container_name: releases_redis
    ports:
      - '6379:6379'
    restart: no

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: releases_filebeat
    user: root
    entrypoint: ['/usr/bin/tini', '--']
    command: ['filebeat', '-e', '-c', '/usr/share/filebeat/filebeat.yml', '--strict.perms=false']
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - logdata:/var/log/github-release-notifier:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: no

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: releases_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -s http://localhost:9200 | grep -q 'You Know, for Search'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: no

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: releases_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: no

volumes:
  pgdata:
  logdata:
  esdata:
