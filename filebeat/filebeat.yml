filebeat.inputs:
  - type: filestream
    id: app-logs
    paths:
      - /var/log/github-release-notifier/app.log
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          expand_keys: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "app-logs-%{+yyyy.MM.dd}"

setup.template.enabled: false
setup.ilm.enabled: false
